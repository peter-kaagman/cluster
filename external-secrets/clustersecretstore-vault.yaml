apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200" # Pas aan naar jouw Vault service
      path: "" # Meestal leeg of v1
      version: "v1" # Secret engine versie
      auth:
        tokenSecretRef:
          name: vault-token
          key: token
          namespace: external-secrets # Zet hier de namespace waar je token secret staat
---
# Plaats dit secret in de juiste namespace (hier: external-secrets)
# apiVersion: v1
# kind: Secret
# metadata:
#   name: vault-token
#   namespace: external-secrets
# stringData:
#   token: "<YOUR_VAULT_TOKEN>"
