apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability
resources:
  - configmap-dashboard-providers.yaml
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: grafana-datasources
    files:
      - datasources.yaml
  - name: grafana-dashboard-ingress-traffic-first-panel
    files:
      - dashboards/ingress-traffic-first-panel.json
      - dashboards/seo-dashboard.json
      - dashboards/mysite-performance.json