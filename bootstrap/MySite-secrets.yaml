apiVersion: v1
kind: Namespace
metadata:
  name: mysite
---
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-secret
  namespace: mysite
  labels:
    app.kubernetes.io/name: mysite
    app.kubernetes.io/component: registry-auth
    app.kubernetes.io/managed-by: gitops
    app.kubernetes.io/created-by: github-copilot
    argocd.argoproj.io/secret-type: registry-auth
# Vervang hieronder de base64-string door je eigen .dockerconfigjson (zie toelichting)
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: "REDACTED_BASE64_DOCKERCONFIG"
# Genereer zelf met: echo '{"auths": {"ghcr.io": {"username": "<user>", "password": "<token>", "email": "<mail>", "auth": "<auth>"}}}' | base64
---
apiVersion: v1
data:
  GITHUB_CLIENT_ID: REDACTED_BASE64
  GITHUB_CLIENT_SECRET: REDACTED_BASE64
  GOOGLE_CLIENT_ID: REDACTED_BASE64
  GOOGLE_CLIENT_SECRET: REDACTED_BASE64
kind: Secret
metadata:
  name: mysite-secrets
  namespace: mysite
  labels:
    app.kubernetes.io/name: mysite
    app.kubernetes.io/component: app-secrets
    app.kubernetes.io/managed-by: gitops
    app.kubernetes.io/created-by: github-copilot
type: Opaque
