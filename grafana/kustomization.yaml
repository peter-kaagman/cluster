apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: grafana-datasources
    files:
      - datasources.yaml
  - name: grafana-dashboard-providers
    files:
      - dashboardproviders.yaml
  - name: grafana-dashboard-ingress-traffic-first-panel
    files:
      - dashboards/ingress-traffic-first-panel.json