apiVersion: v1
kind: Namespace
metadata:
  name: mysql
---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-root-password
  namespace: mysql
type: Opaque
data:
  password: <MYSQL_ROOT_PASSWORD_PLACEHOLDER> # base64 encoded password
---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-happyminds-secret
  namespace: mysql
type: Opaque
data:
  username: <MYSQL_USER_PLACEHOLDER> # base64 encoded username
  password: <MYSQL_PASSWORD_PLACEHOLDER> # base64 encoded password
