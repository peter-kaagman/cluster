apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  labels:
    mprjv65/service: loki
    mprjv65/type: observability
    mprjv65/role: logging
  annotations:
    mprjv65/owner: team-platform
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.55.0
    helm:
      releaseName: loki
      values: |
        deploymentMode: SingleBinary

        singleBinary:
          replicas: 1
          persistence:
            enabled: true
            size: 20Gi

        read:
          replicas: 0

        write:
          replicas: 0

        backend:
          replicas: 0

        gateway:
          enabled: false

        test:
          enabled: false

        lokiCanary:
          enabled: false

        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
            bucketNames:
              chunks: chunks
              ruler: ruler
              admin: admin
          limits_config:
            retention_period: 30d
            ingestion_rate_mb: 4
            ingestion_burst_size_mb: 8
            per_stream_rate_limit: 512KB
            per_stream_rate_limit_burst: 2MB
            max_query_parallelism: 8
            split_queries_by_interval: 15m
          compactor:
            retention_enabled: true
            delete_request_store: filesystem
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
