apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-ingress
  namespace: argocd
  labels:
    mprjv65/service: nginx-ingress
    mprjv65/type: edge
    mprjv65/role: ingress
  annotations:
    mprjv65/owner: team-platform
spec:
  project: default
  source:
    repoURL: https://github.com/peter-kaagman/cluster.git
    targetRevision: main
    path: nginx-ingress
  destination:
    server: https://kubernetes.default.svc
    namespace: nginx-ingress
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
