apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  labels:
    mprjv65/service: grafana
    mprjv65/type: observability
    mprjv65/role: visualization
  annotations:
    mprjv65/owner: team-platform
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    targetRevision: 10.5.15
    helm:
      releaseName: grafana
      values: |
        testFramework:
          enabled: false

        admin:
          existingSecret: grafana-admin-secret
          userKey: admin-user
          passwordKey: admin-password

        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: Loki
                uid: loki
                type: loki
                access: proxy
                url: http://loki.observability.svc.cluster.local:3100
                isDefault: true
                editable: true

        ingress:
          enabled: true
          ingressClassName: nginx
          annotations:
            cert-manager.io/cluster-issuer: "letsencrypt-prod"
            nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
            nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
            nginx.ingress.kubernetes.io/auth-type: "basic"
            nginx.ingress.kubernetes.io/auth-secret: "argocd-basic-auth"
            nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
          hosts:
            - grafana.prjv.nl
          path: /
          pathType: Prefix
          tls:
            - secretName: grafana-tls
              hosts:
                - grafana.prjv.nl

        dashboardProviders:
          dashboardproviders.yaml:
            apiVersion: 1
            providers:
              - name: default
                orgId: 1
                folder: ""
                type: file
                disableDeletion: false
                editable: true
                options:
                  path: /var/lib/grafana/dashboards/default

        dashboards:
          default:
            ingress-traffic-first-panel:
              json: |
                {
                  "annotations": {
                    "list": []
                  },
                  "editable": true,
                  "fiscalYearStartMonth": 0,
                  "graphTooltip": 0,
                  "id": null,
                  "links": [],
                  "liveNow": false,
                  "panels": [
                    {
                      "datasource": {
                        "type": "loki",
                        "uid": "loki"
                      },
                      "fieldConfig": {
                        "defaults": {
                          "color": {
                            "mode": "palette-classic"
                          }
                        },
                        "overrides": []
                      },
                      "gridPos": {
                        "h": 9,
                        "w": 24,
                        "x": 0,
                        "y": 0
                      },
                      "id": 1,
                      "options": {
                        "legend": {
                          "calcs": [],
                          "displayMode": "table",
                          "placement": "bottom",
                          "showLegend": true
                        },
                        "tooltip": {
                          "mode": "multi",
                          "sort": "none"
                        }
                      },
                      "targets": [
                        {
                          "datasource": {
                            "type": "loki",
                            "uid": "loki"
                          },
                          "editorMode": "code",
                          "expr": "sum by (host) (count_over_time({job=\"fluent-bit\",namespace=\"nginx-ingress\",component=\"ingress-controller\",host=~\"$host\"}[5m]))",
                          "queryType": "range",
                          "refId": "A"
                        }
                      ],
                      "title": "Requests per host (5m)",
                      "type": "timeseries"
                    },
                    {
                      "datasource": {
                        "type": "loki",
                        "uid": "loki"
                      },
                      "fieldConfig": {
                        "defaults": {
                          "color": {
                            "mode": "palette-classic"
                          }
                        },
                        "overrides": []
                      },
                      "gridPos": {
                        "h": 9,
                        "w": 12,
                        "x": 0,
                        "y": 9
                      },
                      "id": 2,
                      "options": {
                        "legend": {
                          "calcs": [],
                          "displayMode": "table",
                          "placement": "bottom",
                          "showLegend": true
                        },
                        "tooltip": {
                          "mode": "multi",
                          "sort": "none"
                        }
                      },
                      "targets": [
                        {
                          "datasource": {
                            "type": "loki",
                            "uid": "loki"
                          },
                          "editorMode": "code",
                          "expr": "sum by (host, status) (count_over_time({job=\"fluent-bit\",namespace=\"nginx-ingress\",component=\"ingress-controller\",host=~\"$host\"} | json [5m]))",
                          "queryType": "range",
                          "refId": "A"
                        }
                      ],
                      "title": "Statuscodes per host (5m)",
                      "type": "timeseries"
                    },
                    {
                      "datasource": {
                        "type": "loki",
                        "uid": "loki"
                      },
                      "fieldConfig": {
                        "defaults": {
                          "color": {
                            "mode": "palette-classic"
                          }
                        },
                        "overrides": []
                      },
                      "gridPos": {
                        "h": 9,
                        "w": 12,
                        "x": 12,
                        "y": 9
                      },
                      "id": 3,
                      "options": {
                        "legend": {
                          "calcs": [],
                          "displayMode": "table",
                          "placement": "bottom",
                          "showLegend": true
                        },
                        "tooltip": {
                          "mode": "multi",
                          "sort": "none"
                        }
                      },
                      "targets": [
                        {
                          "datasource": {
                            "type": "loki",
                            "uid": "loki"
                          },
                          "editorMode": "code",
                          "expr": "topk(10, sum by (uri) (count_over_time({job=\"fluent-bit\",namespace=\"nginx-ingress\",component=\"ingress-controller\",host=~\"$host\"} | json | uri != \"\" [15m])))",
                          "queryType": "range",
                          "refId": "A"
                        }
                      ],
                      "title": "Top URLs (15m)",
                      "type": "timeseries"
                    }
                  ],
                  "refresh": "30s",
                  "schemaVersion": 39,
                  "tags": [
                    "observability",
                    "ingress"
                  ],
                  "templating": {
                    "list": [
                      {
                        "allValue": ".+",
                        "current": {
                          "selected": true,
                          "text": "All",
                          "value": "$__all"
                        },
                        "datasource": {
                          "type": "loki",
                          "uid": "loki"
                        },
                        "definition": "label_values({job=\"fluent-bit\",namespace=\"nginx-ingress\",component=\"ingress-controller\"}, host)",
                        "hide": 0,
                        "includeAll": true,
                        "label": "Host",
                        "multi": false,
                        "name": "host",
                        "options": [],
                        "query": "label_values({job=\"fluent-bit\",namespace=\"nginx-ingress\",component=\"ingress-controller\"}, host)",
                        "refresh": 1,
                        "regex": "",
                        "skipUrlSync": false,
                        "sort": 1,
                        "type": "query"
                      }
                    ]
                  },
                  "time": {
                    "from": "now-6h",
                    "to": "now"
                  },
                  "timepicker": {},
                  "timezone": "",
                  "title": "Ingress Traffic - First Panel",
                  "uid": "ingress-first-panel",
                  "version": 2,
                  "weekStart": ""
                }
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
