apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mysite
  namespace: argocd
  labels:
    mprjv65/service: mysite
    mprjv65/type: service
    mprjv65/role: frontend
    mprjv65/depends_on: nginx-ingress
  annotations:
    mprjv65/owner: team-web
spec:
  project: default
  source:
    repoURL: 'https://github.com/peter-kaagman/cluster.git'
    targetRevision: main
    path: mysite
  destination:
    server: https://kubernetes.default.svc
    namespace: mysite
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  info:
    - name: Maintainer
      value: Peter Kaagman
