apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
spec:
  project: default

  destination:
    namespace: observability
    server: https://kubernetes.default.svc

  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 78.5.0
      helm:
        valueFiles:
          - $values/observability/prometheus/values.yaml

    - repoURL: https://github.com/peter-kaagman/cluster.git
      targetRevision: main
      ref: values

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true