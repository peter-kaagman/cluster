apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: happyminds
  namespace: argocd
  labels:
    mprjv65/service: happyminds
    mprjv65/type: service
    mprjv65/role: frontend
    mprjv65/depends_on: mysql,nginx-ingress
  annotations:
    mprjv65/owner: team-web
spec:
  project: default
  source:
    repoURL: 'https://github.com/peter-kaagman/cluster.git'
    targetRevision: main
    path: happyminds
  destination:
    server: https://kubernetes.default.svc
    namespace: happyminds
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
