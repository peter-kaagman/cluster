apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mysql-helm
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/peter-kaagman/cluster.git
    path: mysql/helm
    chart: .
    targetRevision: main
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: mysql
  syncPolicy:
    automated: {}
