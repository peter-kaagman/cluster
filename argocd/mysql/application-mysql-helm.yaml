apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mysql-helm
  namespace: argocd
spec:
  project: default

  source:
    repoURL: registry-1.docker.io
    chart: bitnamicharts/mysql
    targetRevision: 14.0.3

    helm:
      values: |
        architecture: standalone

        auth:
          existingSecret: mysql-root-password
          rootPasswordKey: password
          database: happyminds
          username: happyminds
          existingSecretUser: mysql-happyminds-secret
          usernameKey: username
          passwordKey: password

        primary:
          image:
            registry: docker.io
            repository: peterkaagman/mysql
            tag: 8.4.9
            digest: sha256:14690274f4967ba207939c97dd79a8d6604f1d532218ea6be69c0001ddd2d45f

          persistence:
            enabled: true
            size: 8Gi
            mountPath: /var/lib/mysql

          customLivenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost

  destination:
    server: https://kubernetes.default.svc
    namespace: mysql

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true