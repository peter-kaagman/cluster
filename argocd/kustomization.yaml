# Kustomization voor de ArgoCD platformlaag.
#
# Deze laag bevat alleen de control-plane en de ArgoCD Applications.
# De echte workloads en platformpackages leven apart onder top-level mappen.
resources:
  - application-argocd.yaml
  - ingress-argocd-nginx.yaml
  - apps/application-metallb.yaml
  - apps/application-mysql.yaml
  - apps/application-cert-manager.yaml
  - apps/application-nginx-ingress.yaml
  - apps/application-loki.yaml
  - apps/application-fluent-bit.yaml
  - apps/application-grafana.yaml
  - apps/application-mysite.yaml
  - apps/application-happyminds.yaml
  - apps/application-inspiration.yaml
