apiVersion: v1
kind: ConfigMap
metadata:
  name: wp-config-extra
  namespace: happyminds
data:
  wp-config-extra.php: |
    <?php
    // Force HTTPS when behind Ingress of reverse proxy
    if (isset($_SERVER['HTTP_X_FORWARDED_PROTO']) && $_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
        $_SERVER['HTTPS'] = 'on';
    }
  uploads.ini: |
    upload_max_filesize = 10M
    post_max_size = 10M
    memory_limit = 256M
    max_execution_time = 300
