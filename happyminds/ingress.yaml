apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wordpress-happyminds-ingress
  namespace: happyminds
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # --- Rate limiting (algemeen, mild) ---
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-rpm: "120"
    nginx.ingress.kubernetes.io/limit-connections: "10"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"

    # --- XML-RPC hard block (grootste winst) ---
    nginx.ingress.kubernetes.io/server-snippet: |
      if ($host != "www.happyminds.nl") {
        return 301 https://www.happyminds.nl$request_uri;
      }

      location = /xmlrpc.php {
        return 403;
      }

spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - www.happyminds.nl
        - happyminds.nl
      secretName: wordpress-happyminds-tls

  rules:
    - host: www.happyminds.nl
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wordpress-happyminds
                port:
                  number: 80

    - host: happyminds.nl
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wordpress-happyminds
                port:
                  number: 80