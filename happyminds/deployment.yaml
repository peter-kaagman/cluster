apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress-happyminds
  namespace: happyminds
spec:
  selector:
    matchLabels:
      app: wordpress-happyminds
  replicas: 1
  template:
    metadata:
      labels:
        app: wordpress-happyminds
    spec:
      securityContext:
        fsGroup: 33
      containers:
        - name: wordpress
          image: wordpress:7.0
          env:
            - name: WORDPRESS_DB_HOST
              value: mysql.mysql
            - name: WORDPRESS_DB_USER
              valueFrom:
                secretKeyRef:
                  name: happyminds-secrets
                  key: WORDPRESS_DB_USER
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: happyminds-secrets
                  key: WORDPRESS_DB_PASSWORD
            - name: WORDPRESS_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: happyminds-secrets
                  key: WORDPRESS_DB_NAME
          ports:
            - containerPort: 80
          volumeMounts:
            - name: wp-content
              mountPath: /var/www/html/wp-content
            - name: wp-config-extra
              mountPath: /var/www/html/wp-config-extra.php
              subPath: wp-config-extra.php
            - name: wp-config-extra
              mountPath: /usr/local/etc/php/conf.d/uploads.ini
              subPath: uploads.ini
      volumes:
        - name: wp-content
          persistentVolumeClaim:
            claimName: wp-content-pvc
        - name: wp-config-extra
          configMap:
            name: wp-config-extra
---
apiVersion: v1
kind: Service
metadata:
  name: wordpress-happyminds
  namespace: happyminds
spec:
  selector:
    app: wordpress-happyminds
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
